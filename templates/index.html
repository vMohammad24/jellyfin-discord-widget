<!DOCTYPE html>
<html lang="en">
<head>
    <title>Jellyfin Discord Widget</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #7f5af0;
            --separator: rgba(255, 255, 255, 0.1);
            --radius: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            padding: 2rem;
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            padding-bottom: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--separator);
            color: white;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 1.5rem;
            border: 1px solid var(--separator);
            text-align: center;
        }

        a.button {
            display: inline-block;
            background: var(--accent-color);
            color: white;
            border-radius: var(--radius);
            padding: 0.6rem 1.2rem;
            font-size: 0.95rem;
            font-weight: 500;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        a.button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <h1>Jellyfin Discord Widget</h1>
    <div class="card">
        <a href="/auth/discord/login" class="button">Login with Discord</a>
    </div>
</body>
</html>
