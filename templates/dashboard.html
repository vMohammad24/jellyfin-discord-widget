<!DOCTYPE html>
<html lang="en">
<head>
    <title>Jellyfin Discord Widget</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js" integrity="sha384-H5SrcfygHmAuTDZphMHqBJLc3FhssKjG7w/CeCpFReSfwBWDTKpkzPP8c+cLsK+V" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/htmx-ext-sse@2.2.4" integrity="sha384-A986SAtodyH8eg8x8irJnYUk7i9inVQqYigD6qZ9evobksGNIXfeFvDwLSHcp31N" crossorigin="anonymous"></script>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #7f5af0;
            --error-color: #ff4d4f;
            --success-color: #52c41a;
            --separator: rgba(255, 255, 255, 0.1);
            --radius: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            padding: 2rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        h1, h2 {
            margin-bottom: 1rem;
            color: white;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            text-align: center;
            padding-bottom: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--separator);
        }

        h2 {
            font-size: 1.5rem;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--separator);
        }

        section {
            margin-bottom: 3rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 1.5rem;
            border: 1px solid var(--separator);
        }

        .success {
            background-color: rgba(82, 196, 26, 0.2);
            color: var(--success-color);
            border-left: 4px solid var(--success-color);
            padding: 1rem;
            border-radius: var(--radius);
            margin-bottom: 1.5rem;
        }

        .error {
            background-color: rgba(255, 77, 79, 0.2);
            color: var(--error-color);
            border-left: 4px solid var(--error-color);
            padding: 1rem;
            border-radius: var(--radius);
            margin-bottom: 1.5rem;
        }

        button, .button {
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: var(--radius);
            padding: 0.6rem 1.2rem;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        button:hover, .button:hover {
            opacity: 0.9;
        }

        .auth-status {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .status {
            display: inline-flex;
            align-items: center;
            font-weight: 500;
        }

        .status::before {
            content: "";
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status.connected::before {
            background-color: var(--success-color);
            box-shadow: 0 0 8px rgba(82, 196, 26, 0.6);
        }

        form.create-form {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        input {
            padding: 0.6rem;
            background-color: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--separator);
            border-radius: var(--radius);
            color: var(--text-color);
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        strong {
            color: white;
        }

        .status-playing {
            color: var(--success-color);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-idle {
            color: #aaa;
        }

        .status-error {
            color: var(--error-color);
        }

        .status-unconnected {
            color: #aaa;
            font-style: italic;
        }

        .status-loading {
            color: #aaa;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-top: 1.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--separator);
            padding-bottom: 0.5rem;
        }

        .tab-btn {
            background: transparent;
            color: #888;
            border: none;
            padding: 0.5rem 1rem;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
            position: relative;
        }

        .tab-btn:hover {
            color: white;
            background: transparent;
        }

        .tab-btn.active {
            color: var(--accent-color);
            background: transparent;
        }

        .tab-btn.active::after {
            content: "";
            position: absolute;
            bottom: -10px;
            left: 0;
            right: 0;
            height: 2px;
            background-color: var(--accent-color);
            box-shadow: 0 0 8px var(--accent-color);
        }

        .tab-content {
            display: none;
            margin-top: 1rem;
        }

        .tab-content.active {
            display: block;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            form.create-form {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body hx-boost="true" hx-ext="sse">
    <h1>Jellyfin Discord Widget</h1>

    <section id="auth-section">
        <h2>Authentication</h2>
        <div class="card">
            <div class="auth-status">
                <div class="status connected">Connected to Discord</div>
                <div>Account: <strong>{{ discord_id }}</strong></div>
            </div>
        </div>
    </section>

    <section id="playback-section">
        <h2>Playback Status</h2>
        <div class="card">
            <div id="playback-status" hx-ext="sse" sse-connect="/api/jellyfin/status/sse" sse-swap="message">
                <div class="status-loading">Loading playback status...</div>
            </div>
        </div>
    </section>

    <section id="connection-section">
        <h2>Jellyfin Server Connection</h2>
        <div class="card">
            <div id="connection-status">
                {% if jellyfin_url == "Not connected" %}
                    <div class="error" style="margin-bottom: 0;">Not connected to Jellyfin</div>
                {% else %}
                    <div class="success" style="margin-bottom: 0;">Connected to {{ jellyfin_url }}</div>
                {% endif %}
            </div>

            <div class="tabs">
                <button type="button" class="tab-btn active" onclick="switchTab('quick-connect', event)">Quick Connect</button>
                <button type="button" class="tab-btn" onclick="switchTab('credentials', event)">Username & Password</button>
                <button type="button" class="tab-btn" onclick="switchTab('token', event)">User ID & Access Token</button>
            </div>

            <div id="quick-connect" class="tab-content active">
                <form hx-post="/api/jellyfin/connect" hx-target="#connection-status" class="create-form">
                    <input type="hidden" name="method" value="quick_initiate">
                    <input type="text" name="url" placeholder="Jellyfin Server URL" required style="grid-column: span 3;">
                    <button type="submit" class="button">Quick Connect</button>
                </form>
            </div>

            <div id="credentials" class="tab-content">
                <form hx-post="/api/jellyfin/connect" hx-target="#connection-status" class="create-form" hx-on::after-request="if(event.detail.successful) this.reset()">
                    <input type="hidden" name="method" value="credentials">
                    <input type="text" name="url" placeholder="Jellyfin Server URL" required>
                    <input type="text" name="username" placeholder="Username" required>
                    <input type="password" name="password" placeholder="Password" required>
                    <button type="submit" class="button">Connect</button>
                </form>
            </div>

            <div id="token" class="tab-content">
                <form hx-post="/api/jellyfin/connect" hx-target="#connection-status" class="create-form" hx-on::after-request="if(event.detail.successful) this.reset()">
                    <input type="hidden" name="method" value="token">
                    <input type="text" name="url" placeholder="Jellyfin Server URL" required>
                    <input type="text" name="user_id" placeholder="Jellyfin User ID" required>
                    <input type="password" name="access_token" placeholder="API Access Token" required>
                    <button type="submit" class="button">Connect</button>
                </form>
            </div>
        </div>
    </section>

    <script>
        function switchTab(method, event) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            event.currentTarget.classList.add('active');
            document.getElementById(method).classList.add('active');
        }
    </script>
</body>
</html>
